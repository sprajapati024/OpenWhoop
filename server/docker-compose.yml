services:
  whoop-db:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: whoop-db
    restart: unless-stopped
    environment:
    - POSTGRES_DB=${WHOOP_DB_NAME:-whoop}
    - POSTGRES_USER=${WHOOP_DB_USER:-whoop}
    - POSTGRES_PASSWORD=${WHOOP_DB_PASSWORD}
    - POSTGRES_HOST_AUTH_METHOD=trust
    - TZ=${TZ:-UTC}
    volumes:
    - ${DATA_ROOT}/whoop/db:/var/lib/postgresql/data
    - ./db/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${WHOOP_DB_USER:-whoop} -d ${WHOOP_DB_NAME:-whoop}
      interval: 10s
      timeout: 5s
      retries: 5
  whoop-ingest:
    build:
      context: .
      dockerfile: ingest/Dockerfile
    container_name: whoop-ingest
    restart: unless-stopped
    depends_on:
      whoop-db:
        condition: service_healthy
    environment:
    - WHOOP_API_KEY=${WHOOP_API_KEY}
    - WHOOP_DB_DSN=postgresql://whoop:whoop_dev_pass_CHANGE_ME@whoop-db:5432/whoop
    - WHOOP_RAW_ROOT=/data/raw
    - TZ=${TZ:-UTC}
    volumes:
    - ${DATA_ROOT}/whoop/raw:/data/raw
    ports:
    - ${WHOOP_INGEST_PORT:-8770}:8000
